# 이 파일은 시간이 남을 때 Render 배포에 사용하는 선택 설정입니다.
# 로컬에서 py setup.py, py run.py로 실행할 때는 영향을 주지 않습니다.

services:
  - type: web
    name: ai-product-poster-generator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TEXT_MODEL
        value: gpt-5.6
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: TEAM_NAME
        value: Team Project
